version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: noddit-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres1
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-go/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - noddit-network

  # Go Backend API
  backend:
    image: noddit-backend
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: noddit-backend
    environment:
      PORT: 8080
      FRONTEND_URL: http://localhost:8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres1
      DB_NAME: userdb
      DB_SSLMODE: disable
      JWT_SECRET: T9GKvpb3oX5qqo3sd6+OJ2iqldexr+sGcW8NbNiWYLjLvLv9hlDNr2siDo4AjSYOyOqXsxmMX+/Uh3LhP+x2ww==
      JWT_EXPIRATION_HOURS: 6
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - noddit-network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    image: noddit-frontend
    build:
      context: ./noddit-next
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    container_name: noddit-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    ports:
      - "8081:8081"
    depends_on:
      - backend
    networks:
      - noddit-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  noddit-network:
    driver: bridge
