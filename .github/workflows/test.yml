name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-go
    env:
      # Required for config validation
      FRONTEND_URL: http://localhost:8081
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: testuser
      DB_PASSWORD: testpass
      DB_NAME: testdb
      # Optional - Clerk (can be empty for tests)
      CLERK_SECRET_KEY: ""
      CLERK_DEFAULT_ROLE: user
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend-go/go.sum

      - name: Build
        run: go build -v ./cmd/api

      - name: Run tests
        run: go test ./... -v -count=1 -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./backend-go/coverage.out
          flags: backend
          fail_ci_if_error: false

  frontend:
    name: Next.js Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: noddit-next
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: noddit-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
